name = "underdark"
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"

# KV namespace for post storage
# Create with: wrangler kv namespace create POSTS
# Then replace the id below
[[kv_namespaces]]
binding = "POSTS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Environment variables (set in Cloudflare dashboard or .dev.vars)
# UNDERDARK_PASSPHRASE - your secret passphrase
# UNDERDARK_SECRET - HMAC secret for tokens (auto-generated if not set)
